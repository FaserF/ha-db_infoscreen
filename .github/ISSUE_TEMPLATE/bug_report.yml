name: Bug Report
description: Report a bug with the Deutsche Bahn Infoscreen integration
title: '[Bug]: '
labels: ['bug', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting
        - 🔍 Search [existing issues](https://github.com/FaserF/ha-db_infoscreen/issues) to avoid duplicates
        - 📖 Check the [documentation](https://github.com/FaserF/ha-db_infoscreen/blob/master/README.md)
        - 🔗 View the integration: [![Open your Home Assistant instance and show the db_infoscreen integration.](https://my.home-assistant.io/badges/integration.svg)](https://my.home-assistant.io/redirect/integration/?domain=db_infoscreen)

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: Which version of ha-db_infoscreen are you running? (HACS or integration page)
      placeholder: e.g. v2026.6.2-dev0
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: |
        [![Open your Home Assistant instance and show your Home Assistant version information.](https://my.home-assistant.io/badges/info.svg)](https://my.home-assistant.io/redirect/info/)
      placeholder: e.g. 2026.6.4
    validations:
      required: true

  - type: dropdown
    id: ha_install_type
    attributes:
      label: Home Assistant Installation Type
      description: |
        Can be found in: [![Open your Home Assistant instance and show your Home Assistant version information.](https://my.home-assistant.io/badges/info.svg)](https://my.home-assistant.io/redirect/info/)
      options:
        - Home Assistant OS
        - Home Assistant Container
        - Home Assistant Supervised
        - Home Assistant Core
    validations:
      required: true

  - type: input
    id: station_name
    attributes:
      label: Station Name
      description: Which station are you using? (helps narrow down API issues — leave blank for privacy)
      placeholder: e.g. München Hbf, Berlin Hbf, Frankfurt(Main)Hbf
    validations:
      required: false

  - type: dropdown
    id: api_endpoint
    attributes:
      label: API Endpoint
      description: Which API endpoint is the integration configured to use?
      options:
        - dbf.fabiseitz.de (default)
        - Custom self-hosted instance
    validations:
      required: false

  - type: dropdown
    id: departure_type
    attributes:
      label: Departure Type
      description: What departure type is configured in the integration?
      options:
        - Departures
        - Arrivals
        - Both
    validations:
      required: false

  - type: input
    id: num_departures
    attributes:
      label: Number of Departures Configured
      description: How many departures are you displaying in your sensor configuration?
      placeholder: e.g. 10
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Configure station '...'
        2. Set departure type to '...'
        3. Observe sensor state / error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: |
        Download diagnostics from the integration page and paste here (very helpful!):
        [![Open your Home Assistant instance and show the db_infoscreen integration.](https://my.home-assistant.io/badges/integration.svg)](https://my.home-assistant.io/redirect/integration/?domain=db_infoscreen)
      render: json
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Enable debug logging and paste relevant log lines here.
        Add to `configuration.yaml`:
        ```yaml
        logger:
          default: warning
          logs:
            custom_components.db_infoscreen: debug
        ```
      render: shell
    validations:
      required: true
